<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>生命周期 (新)</title>
  <style>
    .list {
      width: 200px;
      height: 150px;
      overflow: auto;
    }
    .news {
      height: 30px;
    }
  </style>
</head>

<body>
  <div id="example"></div>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  <script type="text/javascript" src="../js/babel.min.js"></script>
  <script type="text/babel">
    /**
     * 新生命周期中即将被废弃的钩子：
     * 1. componentWillMount
     * 2. componentWillReceiveProps
     * 3. componentWillUpdate
     */

     /**
     * 1.初始化
     * 触发条件：由 ReactDOM.render(<MyComponent/>) 初次渲染时
     * constructor()
     * getDerivedStateFromProps()
     * render():提供虚拟DOM，可能会调用多次
     * componentDidMount()：启动定时器、发送Ajax请求、订阅消息，只执行一次
     * 
     * 2.更新
     * 触发条件：组件内部 this.setState({})
     * getDerivedStateFromProps()
     * shouldComponentUpdate()
     * render()
     * getSnapshotBeforeUpdate()
     * componentDidUpdate()
     * 
     * 3.卸载
     * 触发条件：ReactDOM.unmountComponentAtNode()
     * componentWillUnmount()：收尾工作，例如：清除定时器，取消订阅，只执行一次（若不清除定时器则会报错：不能在组件被卸载后更新组件）
     */

    class NewsList extends React.Component {
      constructor(props) {
        console.log('--constructor--')
        super(props)
        this.state = { newsArr: [] };
      }

      // getDerivedStateFromProps
      /**
       * getDerivedStateFromProps用于取代componentWillMount、componentWillUpdate
       * 接收两个参数，都是对象，分别是组件传过来的值props和state中的值
       * 必须有返回值
       */
      static getDerivedStateFromProps(props, state) {
        console.log('--getDerivedStateFromProps--', props, state)
        return null
      }

      // 组件挂载完成
      componentDidMount() {
        console.log('--componentDidMount--')
        this.timerID = setInterval(() => {
          const { newsArr } = this.state;
          const news = `新闻${newsArr.length + 1}`;
          this.setState({ newsArr: [news, ...newsArr] })
        }, 1000)
      }

      shouldComponentUpdate() {
        console.log('--shouldComponentUpdate--')
        return true;
      }

      // getSnapshotBeforeUpdate
      /**
       * getSnapshotBeforeUpdate位于render和componentDidUpdate之间
       * 接收两个参数，都是对象，分别是组件传过来的值props和state中的值
       * 必须与componentDidUpdate配合使用
       * 必须有返回值
       */
      getSnapshotBeforeUpdate(prevProps, prevState) {
        console.log('--getSnapshotBeforeUpdate--', prevProps, prevState)
        return this.refs.list.scrollHeight;
      }

      // 更新完毕组件
      /**
       * 接收三个参数，分别是props、state和getSnapshotBeforeUpdate中传过来的值
       */
      componentDidUpdate(prevProps, prevState, snapshot) {
        console.log('--componentDidUpdate--', prevProps, prevState, snapshot);
        this.refs.list.scrollTop += this.refs.list.scrollHeight - snapshot;
      }


      // 即将卸载组件
      componentWillUnmount() {
        console.log('--componentWillUnmount--')
        clearInterval(this.timerID)
      }

      render() {
        console.log('--render--')
        return (
          <div className="list" ref="list">
            {
              this.state.newsArr && this.state.newsArr.map((item, index) => {
                return <div key={index} className="news">{item}</div>
              })
            }
          </div>
        )
      }
    }

    ReactDOM.render(<NewsList />, document.getElementById('example'))
  </script>
</body>

</html>
