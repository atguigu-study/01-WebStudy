<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>10_key</title>
</head>
<body>
  <div id="root"></div>

  <script type="text/javascript" src="../js/react.development.js"></script>
  <script type="text/javascript" src="../js/react-dom.development.js"></script>
  <script type="text/javascript" src="../js/babel.min.js"></script>
  <script type="text/babel">
    /*
    面试题:
        1). react/vue中的key的作用/内部原理
        2). 为什么列表的key尽量不要用index?
        
    1. 虚拟DOM的key的作用?
        1). 简单的说: key是虚拟DOM对象的标识, 在更新显示时key起着极其重要的作用
        2). 详细的说: 当列表数组中的数据发生变化生成新的虚拟DOM后, React进行新旧虚拟DOM的diff比较
            a. 旧虚拟DOM中找到了与新虚拟DOM相同的key：
                若是虚拟DOM中内容没有变：直接使用原来的真实DOM
                若是虚拟DOM中内容变了：则生成新的真实DOM，随后替换掉页面中之前的真实DOM
            b. 旧虚拟DOM中没有找到与新虚拟DOM相同的key：
                根据数据创建新的真实DOM，随后渲染到页面

    2. key为index的问题
        1). 若对数据进行：逆序添加，逆序删除等破坏顺序操作：
            会产生没有必要的真实DOM更新 ==> 界面效果没问题, 但效率低
        2). 若item界面还有输入框等输入项：
             产生错误的真实DOM更新 ==> 界面有问题
        3). 注意: 如果不存在逆序添加，逆序删除等破坏顺序操作, 仅用于渲染列表用于展示，使用index作为key没有问题。
        
    3. 开发中如何选择key:
        最好是使用每条数据的唯一标识未作为key, 比如id，手机号，身份证号等唯一值
        如果确定只是简单的展示数据，用index作为key也是可以的
    */
    
    /*
    * “慢动作回放”:
    *
    * 一、使用id作为key：
    *
    *   原始数据：
    *       {id: 1, name: '小张', age: 13},
            {id: 2, name: '小李', age: 12}
            
    *   原始数据对应的虚拟DOM：
    *       <li key=1>1--小张--13--<input type="text"/></li>
    *       <li key=2>2--小李--12--<input type="text"/></li>
    *
    *   更新之后的数据：
    *       {id: 3, name: '小王', age: 14},
    *       {id: 1, name: '小张', age: 13},
            {id: 2, name: '小李', age: 12}
            
        更新数据之后新的虚拟DOM：
            <li key=3>3--小王--14--<input type="text"/></li>
            <li key=1>1--小张--13--<input type="text"/></li>
    *       <li key=2>2--小李--12--<input type="text"/></li>
    *
    *二、使用index作为key：
    *
    * 原始数据：
    *       {id: 1, name: '小张', age: 13},
            {id: 2, name: '小李', age: 12}
            
    *   原始数据对应的虚拟DOM：
    *       <li key=0>1--小张--13--<input type="text"/></li>
    *       <li key=1>2--小李--12--<input type="text"/></li>
    *
    *   更新之后的数据：
    *       {id: 3, name: '小王', age: 14},
    *       {id: 1, name: '小张', age: 13},
            {id: 2, name: '小李', age: 12}
            
        更新数据之后新的虚拟DOM：
            <li key=0>3--小王--14--<input type="text"/></li>
            <li key=1>1--小张--13--<input type="text"/></li>
    *       <li key=2>2--小李--12--<input type="text"/></li>
    * */

    class PersonList extends React.Component {

      state = {
        persons: [
          {id: 1, name: '小张', age: 13},
          {id: 2, name: '小李', age: 12}
        ]
      }

      add = () => {
        const { persons } = this.state
        this.setState({ persons: [{ id: persons.length + 1, name: '小王', age: 14 }, ...persons] })
      }

      remove = () => {
        const { persons } = this.state
        persons.shift()
        this.setState({ persons })
      }

      sort = () => {
        const { persons } = this.state
        persons.sort((p1, p2) => {
          return p1.age - p2.age
        })
        this.setState({ persons })
      }
    
      render() {
        const persons = this.state.persons
        return (
          <div>
            <div>
              <button onClick={ this.add }>添加一个【小王】</button>
              &nbsp;
              <button onClick={ this.remove }>移除第一个</button>
              &nbsp;
              <button onClick={ this.sort }>排序</button>
              &nbsp;
            </div>
            <br/>
            <br/>
            
            <h2>使用id作为key</h2>
            <ul>
              {
                persons.map((item) => { return <li key={ item.id }>{ item.id }--{ item.name }--{ item.age }--<input type="text"/></li> })
              }
            </ul>
            <br/>
            <br/>
            <h2>使用index作为key</h2>
            <ul>
              {
                persons.map((item, index) => { return <li key={ index }>{ item.id }--{ item.name }--{ item.age }--<input type="text"/></li> })
              }
            </ul>
          </div>
        )
      }
    }

    ReactDOM.render(<PersonList/>, document.getElementById('root'))
  </script>
</body>
</html>
